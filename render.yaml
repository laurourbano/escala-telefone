services:
  - type: web
    name: escalai-backend
    env: node
    region: ohio
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: escalai-db
          property: connectionString

databases:
  - name: escalai-db
    region: ohio
    plan: free
