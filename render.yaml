services:
  - type: web
    name: escalai-backend
    env: node
    region: ohio
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://laurourbano.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: escalai-db
          property: connectionString

databases:
  - name: escalai-db
    region: ohio
    plan: free
