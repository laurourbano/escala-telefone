<!-- Change Password Modal -->
<div class="modal-overlay" id="modal-change-password">
    <div class="modal">
        <div class="modal-header">
            <h3>Alterar Minha Senha</h3>
            <button class="close-modal"><i class="ph ph-x"></i></button>
        </div>
        <div class="modal-body">
            <form id="form-change-password">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="pw-email" readonly>
                </div>
                <div class="form-group">
                    <label>Senha Atual</label>
                    <div class="input-wrapper">
                        <input type="password" id="pw-current" required>
                        <button type="button" class="toggle-password" data-target="pw-current">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Nova Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="pw-new" required>
                        <button type="button" class="toggle-password" data-target="pw-new">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmar Nova Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="pw-confirm" required>
                        <button type="button" class="toggle-password" data-target="pw-confirm">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="primary-btn w-full">Confirmar Alteração</button>
            </form>
        </div>
    </div>
</div>
