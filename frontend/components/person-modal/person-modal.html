<div class="modal-overlay" id="modal-person">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-person-title">Adicionar Pessoa</h3>
            <button class="close-modal"><i class="ph ph-x"></i></button>
        </div>
        <div class="modal-body">
            <form id="form-person">
                <input type="hidden" id="person-id">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="person-name" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="person-status"
                        onchange="handleStatusChange(this.value)">
                        <option value="disponivel">Disponível</option>
                        <option value="indisponivel">Indisponível</option>
                        <option value="folga">Folga</option>
                        <option value="ferias">Férias</option>
                        <option value="atestado">Atestado</option>
                    </select>
                </div>
                <div class="form-group" id="unavailability-dates" style="display: none;">
                    <label>Período de Indisponibilidade</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="date" id="person-unavailability-start" class="date-input" style="flex: 1;">
                        <span>até</span>
                        <input type="date" id="person-unavailability-end" class="date-input" style="flex: 1;">
                    </div>
                </div>
                <div class="form-group">
                    <label>Máximo de Turnos</label>
                    <input type="number" id="person-max-shifts" value="4" min="0">
                </div>
                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin-bottom: 0;">Turnos Preferenciais</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <button type="button" id="btn-select-all-shifts"
                                style="font-size: 0.7rem; color: var(--primary); background: transparent; border: none; cursor: pointer; padding: 0;">Marcar
                                Todos</button>
                            <span style="color: var(--border); font-size: 0.7rem;">|</span>
                            <button type="button" id="btn-deselect-all-shifts"
                                style="font-size: 0.7rem; color: var(--danger); background: transparent; border: none; cursor: pointer; padding: 0;">Desmarcar
                                Todos</button>
                        </div>
                    </div>
                    <div id="person-preferred-shifts" class="checkbox-group">
                        <!-- Populated dynamically -->
                    </div>
                </div>
                <button type="submit" class="primary-btn w-full">Salvar</button>
            </form>
        </div>
    </div>
</div>
