<!-- Login Overlay -->
<div class="login-overlay active" id="login-overlay">
    <div class="login-card">
        <div class="login-header">
            <i class="ph-fill ph-calendar-check"></i>
            <h2>Bem-vindo ao EscalaAI</h2>
            <p>Faça login para acessar sua escala</p>
        </div>
        <form id="form-login">
            <div class="form-group">
                <label>Login Corporativo (nome.sobrenome)</label>
                <div class="input-wrapper email-input-wrapper">
                    <i class="ph ph-user"></i>
                    <input type="text" id="login-username" placeholder="nome.sobrenome" required>
                    <span class="email-suffix">@crf-pr.org.br</span>
                </div>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="ph ph-lock"></i>
                    <input type="password" id="login-password" value="3820" required>
                    <button type="button" class="toggle-password" data-target="login-password">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="primary-btn w-full">Entrar</button>
            <p id="login-error" class="error-text hidden">E-mail ou senha incorretos.</p>
        </form>
    </div>
</div>
